<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>500 Server Error — Nexora Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:#0A0B14;color:#E8EAFF;-webkit-font-smoothing:antialiased;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
/* BG */
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(91,110,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(91,110,247,0.04) 1px,transparent 1px);background-size:44px 44px;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbFloat 8s ease-in-out infinite;}
.orb1{width:480px;height:480px;top:-160px;left:-160px;background:radial-gradient(circle,rgba(91,110,247,0.16) 0%,transparent 70%);}
.orb2{width:360px;height:360px;bottom:-100px;right:-80px;background:radial-gradient(circle,rgba(139,92,246,0.12) 0%,transparent 70%);animation-delay:-4s;}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-28px) scale(1.04);}}
/* Card */
.card{
  position:relative;z-index:1;
  background:#0F1020;border:1px solid rgba(255,255,255,0.08);border-radius:28px;
  padding:52px 44px;text-align:center;max-width:520px;width:100%;
  box-shadow:0 32px 100px rgba(0,0,0,0.7);
  animation:cardIn .55s cubic-bezier(0.34,1.56,0.64,1) both;
}
@media(max-width:600px){.card{padding:36px 24px;border-radius:20px;}}
@keyframes cardIn{from{opacity:0;transform:translateY(44px) scale(0.92);}to{opacity:1;transform:none;}}
/* Brand */
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:36px;}
.brand-ico{width:36px;height:36px;background:linear-gradient(135deg,#5B6EF7,#8B5CF6);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(91,110,247,0.4);}
.brand-ico svg{width:18px;height:18px;fill:white;}
.brand-txt{font-size:18px;font-weight:800;letter-spacing:-.3px;color:#E8EAFF;}
.brand-txt span{color:#818CF8;}
/* Error code */
.e-code{
  font-size:clamp(72px,16vw,128px);font-weight:900;letter-spacing:-6px;line-height:1;
  background:linear-gradient(135deg,#F59E0B,#EF4444);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;
  animation:codePulse 4s ease-in-out infinite;
}
@keyframes codePulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.2);}}
/* Icon */
.e-icon{
  width:80px;height:80px;border-radius:22px;
  background:rgba(245,158,11,0.12);border:1px solid #F59E0B33;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  animation:iconBob 3.5s ease-in-out infinite;
}
.e-icon svg{width:36px;height:36px;stroke:#F59E0B;fill:none;stroke-width:1.8;}
@keyframes iconBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
/* Text */
.e-title{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;}
.e-msg{font-size:15px;color:#8891B8;line-height:1.75;margin-bottom:36px;max-width:400px;margin-left:auto;margin-right:auto;}
/* Actions */
.e-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:0;}
.e-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;border:none;font-family:inherit;white-space:nowrap;}
.e-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.e-btn-prim{background:#5B6EF7;color:white;box-shadow:0 4px 16px rgba(91,110,247,0.35);}
.e-btn-prim:hover{background:#4A5DE6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(91,110,247,0.48);}
.e-btn-sec{background:#141628;color:#8891B8;border:1px solid rgba(255,255,255,0.09);}
.e-btn-sec:hover{background:#1A1D35;color:#E8EAFF;border-color:rgba(255,255,255,0.16);}
/* Links */
.e-links{display:flex;gap:20px;justify-content:center;margin-top:28px;flex-wrap:wrap;}
.e-link{font-size:13px;color:#535A82;text-decoration:none;transition:color .15s;}
.e-link:hover{color:#818CF8;}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>
<div class="card">
  <div class="brand">
    <div class="brand-ico"><svg viewBox="0 0 24 24"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg></div>
    <div class="brand-txt">Nexora<span>Cloud</span></div>
  </div>
  <div class="e-code">500</div>
  <div class="e-icon">
    <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </div>
  <div class="e-title">Something Went Wrong</div>
  <div class="e-msg">Our server encountered an unexpected error. The issue has been logged and our team is on it. Please try again in a few moments.</div>
  
  <div class="e-actions">
    <button class="e-btn e-btn-sec" onclick="history.back()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Go Back
        </button>
    <a class="e-btn e-btn-prim" href="/dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <button class="e-btn e-btn-sec" onclick="location.reload()"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Try Again</button>
  </div>
  <div class="e-links">
      <a class="e-link" href="/dashboard">Dashboard</a>
      <a class="e-link nav-auth" href="/files">File Manager</a>
      <a class="e-link nav-auth" href="/bots">Bots</a>
      <a class="e-link nav-auth" href="/support">Support</a>
    </div>
<script>
(function(){
  var sid=localStorage.getItem('nsid')||document.cookie.replace(/(?:(?:^|.*;\s*)nsid\s*=\s*([^;]*).*$)|^.*$/,'$1');
  if(!sid){
    document.querySelectorAll('.nav-auth').forEach(function(e){e.style.display='none';});
    // redirect dashboard links to login if no session
    document.querySelectorAll('a[href="/dashboard"]').forEach(function(a){
      a.href='/';
      a.onclick=null;
    });
  }
})();
</script>
</div>
</body>
</html>
