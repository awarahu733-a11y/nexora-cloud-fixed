<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Maintenance — Nexora Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0A0B14;color:#E8EAFF;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.bg{position:fixed;inset:0;pointer-events:none;}
.bg::before{content:'';position:absolute;top:-10%;left:20%;width:700px;height:700px;background:radial-gradient(circle,rgba(91,110,247,0.14) 0%,transparent 70%);border-radius:50%;filter:blur(80px);}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(91,110,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(91,110,247,0.04) 1px,transparent 1px);background-size:44px 44px;}
.card{position:relative;z-index:1;background:#0F1020;border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:52px 44px;text-align:center;max-width:500px;width:100%;box-shadow:0 32px 100px rgba(0,0,0,0.7);animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(44px) scale(0.92);}to{opacity:1;transform:none;}}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;}
.brand-ico{width:36px;height:36px;background:linear-gradient(135deg,#5B6EF7,#8B5CF6);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(91,110,247,.4);}
.brand-ico svg{width:18px;height:18px;fill:white;}
.brand-txt{font-size:18px;font-weight:800;color:#E8EAFF;letter-spacing:-.3px;}
.brand-txt span{color:#818CF8;}
.icon{width:80px;height:80px;border-radius:22px;background:rgba(91,110,247,0.12);border:1px solid rgba(91,110,247,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:iconSpin 4s ease-in-out infinite;}
.icon svg{width:36px;height:36px;stroke:#818CF8;fill:none;stroke-width:1.8;}
@keyframes iconSpin{0%,100%{transform:rotate(0deg);}50%{transform:rotate(20deg);}}
.title{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:12px;}
.msg{font-size:15px;color:#8891B8;line-height:1.75;margin-bottom:32px;}
.progress-wrap{background:rgba(255,255,255,0.06);border-radius:100px;height:5px;overflow:hidden;margin-bottom:10px;}
.progress-bar{height:100%;background:linear-gradient(90deg,#5B6EF7,#A78BFA);border-radius:100px;animation:progress 2.5s ease-in-out infinite alternate;}
@keyframes progress{from{width:35%;}to{width:85%;}}
.progress-label{font-size:12px;color:#535A82;margin-bottom:28px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#141628;color:#8891B8;border:1px solid rgba(255,255,255,0.09);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.btn:hover{background:#1A1D35;color:#E8EAFF;}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div></div>
<div class="card">
  <div class="brand">
    <div class="brand-ico"><svg viewBox="0 0 24 24"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg></div>
    <div class="brand-txt">Nexora<span>Cloud</span></div>
  </div>
  <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
  <div class="title">Under Maintenance</div>
  <div class="msg">We're upgrading Nexora Cloud with new features and improvements. We'll be back shortly — thanks for your patience!</div>
  <div class="progress-wrap"><div class="progress-bar"></div></div>
  <div class="progress-label">Working on it…</div>
  <button class="btn" onclick="location.reload()">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Check Again
  </button>
</div>
<script>setTimeout(()=>location.reload(),30000);</script>
</body>
</html>
