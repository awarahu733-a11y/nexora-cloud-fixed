.filter-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.filter-chip{padding:6px 14px;border-radius:100px;font-size:12.5px;font-weight:600;border:1px solid var(--border-default);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.filter-chip:hover{border-color:var(--border-strong);color:var(--text-primary);}
.filter-chip.active{background:var(--primary-soft);border-color:var(--primary-border);color:#818CF8;}
.act-row{display:flex;align-items:center;gap:13px;padding:13px 20px;border-bottom:1px solid var(--border-subtle);transition:background .15s;}
.act-row:last-child{border-bottom:none;}
.act-row:hover{background:rgba(91,110,247,0.025);}
.act-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.act-ico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.act-body{flex:1;min-width:0;}
.act-msg{font-size:13px;color:var(--text-primary);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.act-category{font-size:11px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.act-time{font-size:11.5px;color:var(--text-muted);flex-shrink:0;white-space:nowrap;}
.act-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.day-separator{padding:8px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);background:var(--bg-elevated);border-bottom:1px solid var(--border-subtle);}
</style>

<script>
(function(){
  var sid=localStorage.getItem('nsid');
  if(!sid){window.location.replace('/');return;}
  document.documentElement.style.visibility='hidden';
  fetch('/api/auth/me',{headers:{'X-Session-Id':sid}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){document.documentElement.style.visibility='';}
      else{localStorage.removeItem('nsid');window.location.replace('/');}
    })
    .catch(function(){document.documentElement.style.visibility='';});
})();
</script>

// ── Clear Firebase IndexedDB on logout ──────────────────────
// signOut alone leaves stale OAuth state in IndexedDB → next
// signInWithPopup silently fails. Clear all 3 DBs on logout.

async function _clearAllFirebaseState() {
  // ── Step 1: Clear Firebase IDB by OPENING + CLEARING (not deleteDatabase) ──
  // deleteDatabase() is BLOCKED when Firebase SDK has the DB open,
  // so it silently "succeeds" without deleting anything. Opening directly
  // and clearing records works even with open connections.
  await new Promise(resolve => {
    try {
      const req = indexedDB.open("firebaseLocalStorageDb");
      req.onerror = () => resolve();
      req.onsuccess = () => {
        const db = req.result;
        try {
          const stores = Array.from(db.objectStoreNames);
          if (!stores.length) { db.close(); resolve(); return; }
          const tx = db.transaction(stores, "readwrite");
          stores.forEach(s => { try { tx.objectStore(s).clear(); } catch(_) {} });
          tx.oncomplete = () => { db.close(); resolve(); };
          tx.onerror   = () => { db.close(); resolve(); };
        } catch(_) { try { db.close(); } catch(_){} resolve(); }
      };
    } catch(_) { resolve(); }
  });

  // ── Step 2: Delete the other Firebase DBs (no open connections on these) ──
  await Promise.all([
    "firebase-heartbeat-database",
    "firebase-installations-database"
  ].map(name => new Promise(res => {
    try { const r = indexedDB.deleteDatabase(name); r.onsuccess = r.onerror = r.onblocked = () => res(); }
    catch(_) { res(); }
  })));

  // ── Step 3: Wipe firebase: keys from sessionStorage ──────────────────────
  try {
    Object.keys(sessionStorage).forEach(k => {
      if (k.startsWith("firebase:") || k.startsWith("firebaseui:")) sessionStorage.removeItem(k);
    });
  } catch(_) {}

  // ── Step 4: Wipe firebase: keys from localStorage ────────────────────────
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith("firebase:") || k.startsWith("firebaseui:")) localStorage.removeItem(k);
    });
  } catch(_) {}

  // ── Step 5: Expire Firebase cookies ──────────────────────────────────────
  try {
    const host = window.location.hostname;
    const domains = [host, "." + host, ""];
    const paths   = ["/", ""];
    document.cookie.split(";").forEach(raw => {
      const name = raw.trim().split("=")[0].trim();
      if (!name) return;
      const isFB = name.startsWith("firebase:") || name.startsWith("firebaseui:")
                || name.startsWith("__Secure-firebase") || name.includes("firebase");
      if (!isFB) return;
      domains.forEach(d => paths.forEach(p => {
        document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT" +
          (p ? ";path=" + p : "") + (d ? ";domain=" + d : "");
        document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;SameSite=None;Secure" +
          (p ? ";path=" + p : "") + (d ? ";domain=" + d : "");
      }));
    });
  } catch(_) {}
}

async function doLogout() {
  try {
    // Step 1: Firebase signOut (CRITICAL!)
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const app = initializeApp({apiKey:"AIzaSyATmS9Zy8YIxXf1qYpUB6wIw45i7K-3YVU",authDomain:"hosting-website-bot-v9-v1.firebaseapp.com",projectId:"hosting-website-bot-v9-v1"});
    const auth = getAuth(app);
    await signOut(auth);
    
    // Step 2: Backend session invalidation
    await fetch("/api/auth/logout", {
      method: "POST",
      headers: { "X-Session-Id": localStorage.getItem("nsid") || "" }
    }).catch(() => {});

    // Step 3: Clear ALL Firebase persistent state
    await _clearAllFirebaseState().catch(() => {});

    // Step 4: Wipe all local state
    localStorage.clear();
    sessionStorage.clear();

    // Step 5: Navigate with cache-buster
    window.location.href = "/?" + Date.now();
  } catch(err) {
    console.error('Logout error:', err);
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "/?" + Date.now();
  }
}

let allActivity = [], currentFilter = "all";

// Map action types to categories
const ACTION_CATEGORY = {login:"user",logout:"user",upload:"file",delete:"file",rename:"file",edit:"file",start:"bot",stop:"bot",pip:"file",malware:"system",ban:"system",create:"file"};

  ban:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`,

const ACTION_STYLE = {
  login:{bg:"rgba(91,110,247,0.12)",color:"#818CF8"},
  logout:{bg:"rgba(83,90,130,0.12)",color:"#535A82"},
  upload:{bg:"rgba(56,189,248,0.12)",color:"#38BDF8"},
  delete:{bg:"rgba(239,68,68,0.12)",color:"#EF4444"},
  start:{bg:"rgba(34,197,94,0.12)",color:"#22C55E"},
  stop:{bg:"rgba(245,158,11,0.12)",color:"#F59E0B"},
  rename:{bg:"rgba(167,139,250,0.12)",color:"#A78BFA"},
  edit:{bg:"rgba(91,110,247,0.12)",color:"#818CF8"},
  pip:{bg:"rgba(20,184,166,0.12)",color:"#14B8A6"},
  create:{bg:"rgba(56,189,248,0.12)",color:"#38BDF8"},

};
const CATEGORY_LABEL = {user:"User",file:"File",bot:"Bot",system:"System"};

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  renderActivity();
}

function fmtDate(iso){
  try{const d=new Date(iso);return d.toLocaleString("en-IN",{timeZone:"Asia/Kolkata",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}catch{return "—";}
}
function fmtDay(iso){
  try{
    const d=new Date(iso);const today=new Date();const yest=new Date();yest.setDate(today.getDate()-1);
    if(d.toDateString()===today.toDateString())return "Today";
    if(d.toDateString()===yest.toDateString())return "Yesterday";
    return d.toLocaleString("en-IN",{timeZone:"Asia/Kolkata",weekday:"long",month:"long",day:"numeric"});
  }catch{return "";}
}

function renderActivity(){
  const el = document.getElementById("activityList");
  let items = allActivity;
  if(currentFilter !== "all"){
    items = allActivity.filter(a => (ACTION_CATEGORY[a.action]||"system") === currentFilter);
  }
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="empty-title">No activity found</div><div class="empty-subtitle">No entries match the selected filter.</div></div>`;
    return;
  }
  // Group by day
  let html = "";
  let lastDay = "";
  items.forEach(a => {
    const day = fmtDay(a.time);
    if(day !== lastDay){
      html += `<div class="day-separator">${esc(day)}</div>`;
      lastDay = day;
    }
    const style = ACTION_STYLE[a.action]||{bg:"rgba(91,110,247,0.1)",color:"#818CF8"};
    const icon = ACTION_ICON[a.action]||ACTION_ICON.edit;
    const cat = ACTION_CATEGORY[a.action]||"system";
    html += `<div class="act-row">
      <div class="act-ico" style="background:${style.bg};color:${style.color}">${icon}</div>
      <div class="act-body">
        <div class="act-msg">${esc(a.msg||"Unknown action")}</div>
        <div class="act-category">${CATEGORY_LABEL[cat]}</div>
      </div>
      <div class="act-time">${fmtDate(a.time)}</div>
    </div>`;
  });
  el.innerHTML = html;
}

async function loadActivity(){
  document.getElementById("activityList").innerHTML=`<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin .7s linear infinite"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></div><div class="empty-title">Loading…</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  try{
    const r=await api("/api/activity");const d=await r.json();
    if(d.success){allActivity=d.activity||[];renderActivity();}
    else{document.getElementById("activityList").innerHTML=`<div class="empty-state"><div class="empty-title">Failed to load</div></div>`;}
  }catch(e){document.getElementById("activityList").innerHTML=`<div class="empty-state"><div class="empty-title">Network error</div></div>`;}
}

function toast(msg,type="info"){
  const c=document.getElementById("toastStack");const el=document.createElement("div");
  el.className=`toast toast-${type}`;el.innerHTML=`<span>${esc(msg)}</span>`;
  c.appendChild(el);setTimeout(()=>{el.classList.add("toast-out");el.addEventListener("animationend",()=>el.remove(),{once:true});},4000);
}

async function init(){
  if(!SID()){window.location.href="/";return;}
  try{
    const r=await api("/api/auth/me");if(!r.ok){window.location.href="/";return;}
    const d=await r.json();const u=d.user;
    const name=u.name||u.email||"User";
    document.getElementById("sName").textContent=name;
    document.getElementById("sRole").textContent=u.role;
    const letter=name[0].toUpperCase();
    const color=avatarColor(name);
    document.querySelectorAll(".sidebar-avatar,.topbar-avatar").forEach(el=>{el.textContent=letter;el.style.background=color;});
    if(["admin","owner"].includes(u.role))document.getElementById("adminNavItem").style.display="block";
  }catch(e){window.location.href="/";}
  loadActivity();
}
init();
</script>
</body>
</html>
